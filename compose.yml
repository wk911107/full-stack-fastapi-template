services:
  db:
    image: postgres:18
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - app-db-data:/var/lib/postgresql/data/pgdata
    env_file: [.env]
    # 允许你在 Windows 上用数据库软件直接连
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_DB=${POSTGRES_DB?Variable not set}
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    # 🔥 核心：让容器保持运行但不启动 FastAPI，把 8000 端口留给 F5 调试
    command: sleep infinity 
    volumes:
      - .:/workspace:cached
    env_file: [.env]
    depends_on:
      db:
        condition: service_healthy
    # 这里不需要映射端口，因为端口转发由 devcontainer.json 处理

volumes:
  app-db-data:

# 为了兼容你之前的配置，保留这个网络名，但不设为 external
networks:
  traefik-public: